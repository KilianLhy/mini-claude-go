# Local development stack:
#   - mini-claude app: PostgreSQL + the sync server
#   - local LLM: Ollama (+ init to pull a model)
#   - monitoring: Prometheus, Grafana, node-exporter, cAdvisor
# Usage:  docker compose up --build
services:
  # --- mini-claude application ---------------------------------------------
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: miniclaude
      POSTGRES_PASSWORD: miniclaude
      POSTGRES_DB: miniclaude
    ports:
      # Host port 5433 to avoid clashing with a local Postgres on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniclaude"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    environment:
      DATABASE_URL: postgres://miniclaude:miniclaude@db:5432/miniclaude?sslmode=disable
      JWT_SECRET: dev-secret-change-me
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # --- documentation site (Hugo, built then served by nginx) ---------------
  docs:
    build: ./docs-site
    ports:
      - "1313:80"

  # --- local LLM (Ollama) --------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Pulls the configured model(s) once Ollama is up, then exits.
  ollama-init:
    image: alpine/curl:8.19.0
    container_name: ollama-init
    environment:
      - OLLAMA_MODELS=${OLLAMA_MODELS:-llama3.2:3b}
    depends_on:
      - ollama
    volumes:
      - ./ollama-init.sh:/ollama-init.sh:ro
    entrypoint: ["sh", "/ollama-init.sh"]
    restart: "no"

  # --- monitoring ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      # Auto-provision the Prometheus data source and the mini-claude dashboard.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro"
    ports:
      - "9100:9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker:/var/lib/docker:ro"
      - "/dev/disk:/dev/disk:ro"
    ports:
      # Host 8081 to avoid clashing with the app server on 8080.
      - "8081:8080"

volumes:
  pgdata:
  ollama_data:
  prometheus_data:
  grafana_data:
